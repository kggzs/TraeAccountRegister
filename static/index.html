<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    <title>✨ Trae 账号生成器 & Token 管理器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-main: #f5f7fa;
            --bg-card: #ffffff;
            --bg-card-hover: #f8f9fa;
            --bg-log: #f8f9fa;
            --bg-input: #ffffff;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-light: #e0e7ff;
            --text: #1e293b;
            --text-gray: #64748b;
            --text-light: #94a3b8;
            --success: #10b981;
            --success-light: #d1fae5;
            --fail: #ef4444;
            --fail-light: #fee2e2;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --shadow: rgba(0, 0, 0, 0.08);
            --shadow-lg: rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            /* 移动端优化 */
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 25px 30px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px var(--shadow);
        }

        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .status-indicator {
            background: var(--success-light);
            color: var(--success);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 2px 4px var(--shadow);
        }

        .status-indicator.running {
            background: var(--warning-light);
            color: var(--warning);
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 2px 8px var(--shadow);
            transition: all 0.3s ease;
            border: 1px solid var(--border);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow-lg);
        }

        .stat-icon {
            font-size: 48px;
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .stat-card:nth-child(1) .stat-icon {
            background: var(--success-light);
        }

        .stat-card:nth-child(2) .stat-icon {
            background: var(--warning-light);
        }

        .stat-card:nth-child(3) .stat-icon {
            background: var(--fail-light);
        }

        .stat-card:nth-child(4) .stat-icon {
            background: var(--accent-light);
        }

        .stat-content {
            flex: 1;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
            line-height: 1;
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-gray);
            font-weight: 500;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: var(--text-gray);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            flex: 1;
            /* 移动端优化 */
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }

        .tab:hover {
            background: var(--bg-card-hover);
            color: var(--text);
        }

        .tab.active {
            background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: white;
            padding: 28px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 4px 12px var(--shadow-lg);
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        .form-input {
            width: 100%;
            background: var(--bg-input);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .form-input:read-only {
            background: var(--bg-log);
            cursor: not-allowed;
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 6px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 4px var(--shadow);
            /* 移动端优化 */
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px var(--shadow-lg);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--accent-hover) 0%, #7c3aed 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--fail) 0%, #dc2626 100%);
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 18px;
        }

        .quick-select {
            margin-top: 18px;
        }

        .quick-select-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-gray);
            margin-bottom: 10px;
        }

        .quick-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .quick-btn {
            background: var(--bg-log);
            color: var(--accent);
            border: 2px solid var(--border);
            padding: 14px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quick-btn:hover {
            background: var(--accent-light);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 2px 8px var(--shadow);
        }

        .progress-section {
            margin-bottom: 20px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .progress-bar-container {
            background: var(--bg-log);
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 16px;
            box-shadow: inset 0 2px 4px var(--shadow);
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--accent) 0%, #8b5cf6 100%);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .progress-footer {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-gray);
            font-weight: 500;
        }

        .log-area {
            background: var(--bg-log);
            padding: 20px;
            border-radius: 12px;
            height: 400px;
            overflow-y: auto;
            overflow-x: hidden;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            color: var(--text);
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
            word-break: break-all;
            border: 1px solid var(--border);
            /* 移动端滚动优化 */
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }

        .log-area::-webkit-scrollbar {
            width: 10px;
        }

        .log-area::-webkit-scrollbar-track {
            background: var(--border-light);
            border-radius: 5px;
        }

        .log-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }

        .log-area::-webkit-scrollbar-thumb:hover {
            background: var(--text-light);
        }

        .account-list {
            background: var(--bg-log);
            border-radius: 12px;
            padding: 12px;
            height: 1100px;
            overflow-y: auto;
            overflow-x: hidden;
            border: 1px solid var(--border);
            /* 移动端滚动优化 */
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }

        .account-list::-webkit-scrollbar {
            width: 10px;
        }

        .account-list::-webkit-scrollbar-track {
            background: var(--border-light);
            border-radius: 5px;
        }

        .account-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }

        .account-list::-webkit-scrollbar-thumb:hover {
            background: var(--text-light);
        }

        .account-item {
            padding: 12px 16px;
            margin-bottom: 6px;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            font-weight: 500;
            /* 移动端优化 */
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }

        .account-item:hover {
            background: var(--accent-light);
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .account-item.selected {
            background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
            color: white;
            border-color: var(--accent);
        }

        .file-item {
            padding: 12px 16px;
            margin-bottom: 6px;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* 移动端优化 */
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }

        .file-item:hover {
            background: var(--accent-light);
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .file-item.selected {
            background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
            color: white;
            border-color: var(--accent);
        }

        .file-item-info {
            flex: 1;
            overflow: hidden;
            word-wrap: break-word;
            word-break: break-all;
            min-width: 0;
        }

        .file-item-actions {
            display: flex;
            gap: 6px;
            margin-left: 10px;
        }

        .copy-btn-small {
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .copy-btn-small:hover {
            transform: scale(1.05);
        }

        .token-display {
            background: var(--bg-log);
            padding: 18px;
            border-radius: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            color: var(--success);
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            line-height: 1.6;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        select.form-input {
            cursor: pointer;
        }

        /* 移动端优化 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                max-width: 100%;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
                padding: 20px 15px;
            }

            .header h1 {
                font-size: 22px;
            }

            .status-indicator {
                font-size: 12px;
                padding: 8px 16px;
            }

            .stats-row {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                margin-bottom: 20px;
            }

            .stat-card {
                padding: 16px;
                gap: 12px;
            }

            .stat-icon {
                font-size: 36px;
                width: 48px;
                height: 48px;
            }

            .stat-value {
                font-size: 28px;
            }

            .stat-label {
                font-size: 12px;
            }

            .tabs {
                flex-direction: column;
                gap: 4px;
                padding: 6px;
            }

            .tab {
                padding: 14px 16px;
                font-size: 13px;
                width: 100%;
            }

            .card {
                padding: 20px 16px;
                margin-bottom: 15px;
            }

            .card-title {
                font-size: 16px;
                margin-bottom: 16px;
                flex-wrap: wrap;
                gap: 8px;
            }

            .form-group {
                margin-bottom: 16px;
            }

            .form-label {
                font-size: 12px;
                margin-bottom: 6px;
            }

            .form-input {
                padding: 14px 16px;
                font-size: 16px; /* 防止 iOS 自动缩放 */
                border-radius: 8px;
            }

            .btn {
                padding: 14px 20px;
                font-size: 14px;
                min-height: 44px; /* 确保触摸目标足够大 */
            }

            .btn-row {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .quick-buttons {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .quick-btn {
                padding: 16px 12px;
                font-size: 11px;
                min-height: 60px;
            }

            .progress-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .progress-header .card-title {
                margin-bottom: 0;
            }

            .progress-footer {
                flex-direction: column;
                gap: 6px;
                font-size: 12px;
            }

            .log-area {
                height: 300px;
                padding: 16px;
                font-size: 11px;
                line-height: 1.6;
            }

            .account-list {
                height: auto;
                max-height: 500px;
                padding: 10px;
            }

            .account-item {
                padding: 14px 12px;
                font-size: 13px;
                min-height: 44px; /* 触摸目标 */
            }

            .file-item {
                padding: 14px 12px;
                font-size: 13px;
                min-height: 44px;
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .file-item-info {
                width: 100%;
            }

            .file-item-actions {
                width: 100%;
                justify-content: flex-start;
                margin-left: 0;
            }

            .copy-btn-small {
                padding: 8px 12px;
                font-size: 12px;
                min-height: 36px;
            }

            .token-display {
                padding: 14px;
                font-size: 11px;
                max-height: 150px;
            }

            .grid-2 {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            /* Token 标签页移动端优化 */
            #tabToken .grid-2 {
                flex-direction: column;
            }

            #tabToken .card {
                margin-bottom: 15px;
            }

            /* 文件管理标签页移动端优化 */
            #tabFiles .card-title {
                flex-direction: column;
                align-items: flex-start;
            }

            #tabFiles .card-title > div {
                width: 100%;
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-top: 10px;
            }

            #tabFiles .card-title .btn {
                flex: 1;
                min-width: calc(50% - 4px);
                font-size: 12px;
                padding: 10px 8px;
            }

            #fileList,
            #fileContent {
                height: 400px;
            }
        }

        /* 小屏幕手机优化 */
        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .header {
                padding: 15px 12px;
            }

            .header h1 {
                font-size: 20px;
            }

            .stats-row {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .stat-card {
                padding: 14px;
            }

            .stat-value {
                font-size: 24px;
            }

            .card {
                padding: 16px 12px;
            }

            .card-title {
                font-size: 15px;
            }

            .form-input {
                padding: 12px 14px;
            }

            .btn {
                padding: 12px 18px;
                font-size: 13px;
            }

            .quick-buttons {
                grid-template-columns: 1fr;
            }

            .quick-btn {
                min-height: 50px;
            }

            .log-area {
                height: 250px;
                font-size: 10px;
            }

            .account-list {
                max-height: 400px;
            }

            #fileList,
            #fileContent {
                height: 350px;
            }

            /* 文件管理按钮在小屏幕上垂直排列 */
            #tabFiles .card-title > div {
                flex-direction: column;
            }

            #tabFiles .card-title .btn {
                width: 100%;
                min-width: 100%;
            }
        }

        /* 横屏模式优化 */
        @media (max-width: 768px) and (orientation: landscape) {
            .log-area {
                height: 200px;
            }

            .account-list {
                max-height: 300px;
            }

            #fileList,
            #fileContent {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ Trae 账号生成器</h1>
            <div class="status-indicator" id="statusIndicator">● 就绪</div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon" style="color: var(--success);">✅</div>
                <div class="stat-content">
                    <div class="stat-value" id="statSuccess">0</div>
                    <div class="stat-label">成功注册</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="color: var(--warning);">⚡</div>
                <div class="stat-content">
                    <div class="stat-value" id="statPending">0</div>
                    <div class="stat-label">进行中</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="color: var(--fail);">❌</div>
                <div class="stat-content">
                    <div class="stat-value" id="statFail">0</div>
                    <div class="stat-label">失败</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="color: var(--accent);">📊</div>
                <div class="stat-content">
                    <div class="stat-value" id="statTotal">0</div>
                    <div class="stat-label">总计</div>
                </div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('registration')">📝 账号注册</button>
            <button class="tab" onclick="switchTab('token')">🔑 Token 管理</button>
            <button class="tab" onclick="switchTab('files')">📁 文件管理</button>
        </div>

        <!-- Registration Tab -->
        <div id="tabRegistration" class="tab-content active">
            <div class="card">
                <div class="card-title">⚙️ 注册设置</div>
                <div class="grid-2">
                    <div>
                        <div class="form-group">
                            <label class="form-label">👤 注册数量</label>
                            <input type="number" class="form-input" id="inputTotal" value="10" min="1">
                            <div class="form-hint">💡 建议: 1-20 个</div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">⚡ 并发数</label>
                            <input type="number" class="form-input" id="inputConcurrency" value="3" min="1">
                            <div class="form-hint">💡 建议: 3-5 个</div>
                        </div>
                    </div>
                    <div>
                        <div class="btn-row">
                            <button class="btn btn-primary" id="btnStart" onclick="startRegistration()">▶ 开始注册</button>
                            <button class="btn btn-danger" id="btnStop" onclick="stopRegistration()">⏹ 停止注册</button>
                        </div>
                        <div class="quick-select">
                            <div class="quick-select-label">快速选择</div>
                            <div class="quick-buttons">
                                <button class="quick-btn" onclick="setTotal(1)">1<br>单个</button>
                                <button class="quick-btn" onclick="setTotal(5)">5<br>快速</button>
                                <button class="quick-btn" onclick="setTotal(10)">10<br>标准</button>
                                <button class="quick-btn" onclick="setTotal(20)">20<br>批量</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card progress-section">
                <div class="progress-header">
                    <div class="card-title">📈 注册进度</div>
                    <div style="font-size: 20px; font-weight: 700; background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;" id="progressPercent">0%</div>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="progress-footer">
                    <span id="progressDetail">已完成 0 / 10</span>
                    <span id="progressTime">预计剩余: 0分0秒</span>
                </div>
            </div>

            <div class="card">
                <div class="card-title">
                    📋 运行日志
                    <button class="btn" style="margin-left: auto; padding: 8px 16px; font-size: 12px; background: var(--bg-log); color: var(--text);" onclick="clearLog()">🗑 清空</button>
                </div>
                <div class="log-area" id="logArea"></div>
            </div>
        </div>

        <!-- Token Tab -->
        <div id="tabToken" class="tab-content">
            <div class="grid-2" style="align-items: stretch;">
                <div class="card" style="display: flex; flex-direction: column; margin-bottom: 0; min-height: 0;">
                    <div class="card-title" style="flex-shrink: 0;">
                        📋 账号列表
                        <button class="btn" style="margin-left: auto; padding: 8px 16px; font-size: 12px; background: var(--bg-log); color: var(--text);" onclick="loadAccounts()">🔄 刷新</button>
                    </div>
                    <div class="account-list" id="accountList"></div>
                </div>
                <div style="display: flex; flex-direction: column; gap: 20px; min-height: 0;">
                    <div class="card">
                        <div class="card-title">👤 当前账号</div>
                        <div class="form-group">
                            <label class="form-label">Email:</label>
                            <input type="text" class="form-input" id="tokenEmail" readonly>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password:</label>
                            <input type="password" class="form-input" id="tokenPassword" readonly>
                        </div>
                        <button class="btn btn-primary" style="width: 100%;" id="btnGetToken" onclick="getToken()">🔑 获取 Token</button>
                    </div>
                    <div class="card">
                        <div class="card-title">
                            🔐 Token
                            <button class="btn" style="margin-left: auto; padding: 8px 16px; font-size: 12px; background: var(--bg-log); color: var(--text);" onclick="copyToken()">📋 复制</button>
                        </div>
                        <div class="token-display" id="tokenDisplay">等待获取Token...</div>
                    </div>
                    <div class="card">
                        <div class="card-title">
                            🍪 Cookies
                            <button class="btn" style="margin-left: auto; padding: 8px 16px; font-size: 12px; background: var(--bg-log); color: var(--text);" onclick="copyCookies()">📋 复制</button>
                        </div>
                        <div class="token-display" id="cookiesDisplay">等待获取Cookies...</div>
                    </div>
                    <div class="card" style="margin-bottom: 0;">
                        <div class="card-title">📝 工作日志</div>
                        <div class="log-area" id="tokenLogArea" style="height: 400px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Files Tab -->
        <div id="tabFiles" class="tab-content">
            <div class="card">
                <div class="card-title">
                    📁 文件管理
                    <div style="margin-left: auto; display: flex; gap: 8px;">
                        <button class="btn btn-primary" onclick="loadFileContent('accounts')">📄 accounts.txt</button>
                        <button class="btn btn-primary" onclick="loadFileContent('cookies')">🍪 Cookies</button>
                        <button class="btn btn-primary" onclick="loadFileContent('tokens')">🔑 GetUserToken</button>
                        <button class="btn" style="background: var(--bg-log); color: var(--text);" onclick="refreshFileList()">🔄 刷新</button>
                    </div>
                </div>
                <div class="grid-2" style="gap: 20px;">
                    <!-- Left: File List -->
                    <div class="card" style="margin-bottom: 0;">
                        <div class="card-title">
                            <span id="fileListTitle">文件列表</span>
                        </div>
                        <div class="account-list" id="fileList" style="height: 600px; overflow-y: auto;">
                            请选择文件类型...
                        </div>
                    </div>
                    <!-- Right: File Content -->
                    <div class="card" style="margin-bottom: 0;">
                        <div class="card-title">
                            <span id="fileViewerTitle">文件内容</span>
                            <button class="btn" style="margin-left: auto; padding: 8px 16px; font-size: 12px; background: var(--bg-log); color: var(--text);" onclick="copyFileContent()">📋 复制</button>
                        </div>
                        <div class="log-area" id="fileContent" style="height: 600px; overflow-y: auto;">请从左侧列表选择一个文件查看内容...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let stats = {success: 0, fail: 0, total: 0, pending: 0};
        let selectedAccount = null;

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'log') {
                    addLog(data.message);
                } else if (data.type === 'stats') {
                    updateStats(data.stats);
                } else if (data.type === 'status') {
                    updateStatus(data.is_running);
                } else if (data.type === 'token') {
                    if (data.token) {
                        document.getElementById('tokenDisplay').textContent = data.token;
                    }
                    if (data.cookies) {
                        document.getElementById('cookiesDisplay').textContent = data.cookies;
                    }
                }
            };
            
            ws.onclose = () => {
                setTimeout(connectWebSocket, 3000);
            };
        }

        function addLog(message) {
            const logArea = document.getElementById('logArea');
            const tokenLogArea = document.getElementById('tokenLogArea');
            const time = new Date().toLocaleTimeString();
            const logEntry = `[${time}] ${message}\n`;
            
            logArea.textContent += logEntry;
            logArea.scrollTop = logArea.scrollHeight;
            
            if (message.includes('Token')) {
                tokenLogArea.textContent += logEntry;
                tokenLogArea.scrollTop = tokenLogArea.scrollHeight;
            }
        }

        function updateStats(newStats) {
            stats = newStats;
            document.getElementById('statSuccess').textContent = stats.success;
            document.getElementById('statPending').textContent = stats.pending;
            document.getElementById('statFail').textContent = stats.fail;
            document.getElementById('statTotal').textContent = stats.total;
            
            const done = stats.success + stats.fail;
            const total = stats.total;
            if (total > 0) {
                const percent = Math.round((done / total) * 100);
                document.getElementById('progressPercent').textContent = percent + '%';
                document.getElementById('progressBar').style.width = percent + '%';
                document.getElementById('progressDetail').textContent = `已完成 ${done} / ${total}`;
            }
        }

        function updateStatus(isRunning) {
            const indicator = document.getElementById('statusIndicator');
            const btnStart = document.getElementById('btnStart');
            const btnStop = document.getElementById('btnStop');
            
            if (isRunning) {
                indicator.textContent = '● 运行中...';
                indicator.classList.add('running');
                btnStart.disabled = true;
                btnStop.disabled = false;
            } else {
                indicator.textContent = '● 就绪';
                indicator.classList.remove('running');
                btnStart.disabled = false;
                btnStop.disabled = true;
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            event.target.classList.add('active');
            if (tabName === 'registration') {
                document.getElementById('tabRegistration').classList.add('active');
            } else if (tabName === 'token') {
                document.getElementById('tabToken').classList.add('active');
                setTimeout(syncAccountListHeight, 100);
            } else if (tabName === 'files') {
                document.getElementById('tabFiles').classList.add('active');
                refreshFileList();
            }
        }

        function setTotal(val) {
            document.getElementById('inputTotal').value = val;
        }

        async function startRegistration() {
            const total = parseInt(document.getElementById('inputTotal').value);
            const concurrency = parseInt(document.getElementById('inputConcurrency').value);
            
            if (total <= 0 || concurrency <= 0) {
                alert('请输入有效的数字');
                return;
            }
            
            try {
                const response = await fetch('/api/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `total=${total}&concurrency=${concurrency}`
                });
                const data = await response.json();
                if (!data.success) {
                    alert(data.message);
                }
            } catch (error) {
                alert('启动失败: ' + error.message);
            }
        }

        async function stopRegistration() {
            try {
                await fetch('/api/stop', {method: 'POST'});
            } catch (error) {
                alert('停止失败: ' + error.message);
            }
        }

        function clearLog() {
            document.getElementById('logArea').textContent = '';
        }

        async function loadAccounts() {
            try {
                const response = await fetch('/api/accounts');
                const data = await response.json();
                const list = document.getElementById('accountList');
                list.innerHTML = '';
                
                if (data.success && data.accounts.length > 0) {
                    data.accounts.forEach(acc => {
                        const item = document.createElement('div');
                        item.className = 'account-item';
                        item.textContent = acc.email;
                        item.onclick = () => selectAccount(acc);
                        list.appendChild(item);
                    });
                } else {
                    list.textContent = '暂无账号';
                }
                // 加载账号后同步高度
                setTimeout(syncAccountListHeight, 100);
            } catch (error) {
                addLog('加载账号失败: ' + error.message);
            }
        }

        function selectAccount(account) {
            selectedAccount = account;
            document.getElementById('tokenEmail').value = account.email;
            document.getElementById('tokenPassword').value = account.password;
            document.querySelectorAll('.account-item').forEach(item => {
                item.classList.remove('selected');
                if (item.textContent === account.email) {
                    item.classList.add('selected');
                }
            });
            document.getElementById('tokenDisplay').textContent = '等待获取Token...';
            document.getElementById('cookiesDisplay').textContent = '等待获取Cookies...';
        }

        async function getToken() {
            const email = document.getElementById('tokenEmail').value;
            const password = document.getElementById('tokenPassword').value;
            
            if (!email || !password) {
                alert('请先选择一个账号');
                return;
            }
            
            try {
                const response = await fetch('/api/get-token', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
                });
                const data = await response.json();
                if (!data.success) {
                    alert(data.message);
                }
            } catch (error) {
                alert('获取Token失败: ' + error.message);
            }
        }

        function copyToken() {
            const token = document.getElementById('tokenDisplay').textContent;
            if (token && token !== '等待获取Token...') {
                navigator.clipboard.writeText(token).then(() => {
                    alert('Token 已复制到剪贴板');
                });
            }
        }

        function copyCookies() {
            const cookies = document.getElementById('cookiesDisplay').textContent;
            if (cookies && cookies !== '等待获取Cookies...') {
                navigator.clipboard.writeText(cookies).then(() => {
                    alert('Cookies 已复制到剪贴板');
                });
            }
        }

        let currentFileType = '';
        let currentFileName = '';
        let currentFileData = null;

        async function loadFileContent(type) {
            currentFileType = type;
            const fileList = document.getElementById('fileList');
            const fileContent = document.getElementById('fileContent');
            const fileViewerTitle = document.getElementById('fileViewerTitle');
            const fileListTitle = document.getElementById('fileListTitle');
            
            fileList.innerHTML = '加载中...';
            fileContent.textContent = '加载中...';
            
            try {
                if (type === 'accounts') {
                    const response = await fetch('/api/file/accounts');
                    const data = await response.json();
                    if (data.success) {
                        fileListTitle.textContent = 'accounts.txt 账号列表';
                        fileList.innerHTML = '';
                        
                        // Parse accounts.txt content
                        const lines = data.content.split('\n');
                        let accountIndex = 0;
                        lines.forEach((line, idx) => {
                            if (idx === 0 && line.includes('Email')) return; // Skip header
                            const parts = line.trim().split(/\s+/);
                            if (parts.length >= 2) {
                                const email = parts[0];
                                const password = parts[1];
                                accountIndex++;
                                
                                const item = document.createElement('div');
                                item.className = 'file-item';
                                // Escape quotes for onclick handlers
                                const emailEscaped = email.replace(/'/g, "\\'");
                                const passwordEscaped = password.replace(/'/g, "\\'");
                                item.innerHTML = `
                                    <div class="file-item-info">${accountIndex}. ${email}</div>
                                    <div class="file-item-actions">
                                        <button class="copy-btn-small" style="background: var(--success-light); color: var(--success);" onclick="event.stopPropagation(); copyEmail('${emailEscaped}')" title="复制邮箱">📧</button>
                                        <button class="copy-btn-small" style="background: var(--warning-light); color: var(--warning);" onclick="event.stopPropagation(); copyPassword('${passwordEscaped}')" title="复制密码">🔑</button>
                                        <button class="copy-btn-small" style="background: var(--accent-light); color: var(--accent);" onclick="event.stopPropagation(); copyAccount('${emailEscaped}', '${passwordEscaped}')" title="复制全部">📋</button>
                                    </div>
                                `;
                                item.onclick = () => selectFileItem(item, {email, password, type: 'account'});
                                fileList.appendChild(item);
                            }
                        });
                        
                        if (accountIndex === 0) {
                            fileList.textContent = '暂无账号';
                        }
                    } else {
                        fileList.textContent = '加载失败: ' + (data.error || '未知错误');
                    }
                } else if (type === 'cookies') {
                    const response = await fetch('/api/file/cookies');
                    const data = await response.json();
                    if (data.success && data.files.length > 0) {
                        fileListTitle.textContent = `Cookies (${data.files.length})`;
                        fileList.innerHTML = '';
                        data.files.forEach(file => {
                            const item = document.createElement('div');
                            item.className = 'file-item';
                            item.innerHTML = `
                                <div class="file-item-info">${file}</div>
                                <div class="file-item-actions">
                                    <button class="copy-btn-small" style="background: var(--accent-light); color: var(--accent);" onclick="event.stopPropagation(); copyFile('cookies', '${file}')">📋 复制</button>
                                </div>
                            `;
                            item.onclick = () => selectFileItem(item, {filename: file, type: 'cookie'});
                            fileList.appendChild(item);
                        });
                    } else {
                        fileList.textContent = '暂无 Cookies 文件';
                    }
                } else if (type === 'tokens') {
                    const response = await fetch('/api/file/tokens');
                    const data = await response.json();
                    if (data.success && data.files.length > 0) {
                        fileListTitle.textContent = `GetUserToken (${data.files.length})`;
                        fileList.innerHTML = '';
                        data.files.forEach(file => {
                            const item = document.createElement('div');
                            item.className = 'file-item';
                            item.innerHTML = `
                                <div class="file-item-info">${file}</div>
                                <div class="file-item-actions">
                                    <button class="copy-btn-small" style="background: var(--accent-light); color: var(--accent);" onclick="event.stopPropagation(); copyFile('tokens', '${file}')">📋 复制</button>
                                </div>
                            `;
                            item.onclick = () => selectFileItem(item, {filename: file, type: 'token'});
                            fileList.appendChild(item);
                        });
                    } else {
                        fileList.textContent = '暂无 GetUserToken 文件';
                    }
                }
            } catch (error) {
                fileList.textContent = '加载失败: ' + error.message;
            }
        }

        async function selectFileItem(item, fileData) {
            // Remove selected class from all items
            document.querySelectorAll('.file-item').forEach(i => i.classList.remove('selected'));
            item.classList.add('selected');
            
            currentFileData = fileData;
            const fileContent = document.getElementById('fileContent');
            const fileViewerTitle = document.getElementById('fileViewerTitle');
            
            try {
                if (fileData.type === 'account') {
                    fileViewerTitle.textContent = `账号: ${fileData.email}`;
                    fileContent.textContent = `${fileData.email}\n${fileData.password}`;
                } else if (fileData.type === 'cookie') {
                    const response = await fetch(`/api/file/cookies/${encodeURIComponent(fileData.filename)}`);
                    const data = await response.json();
                    if (data.success) {
                        fileViewerTitle.textContent = fileData.filename;
                        fileContent.textContent = data.content;
                    } else {
                        fileContent.textContent = '读取文件失败: ' + (data.error || '未知错误');
                    }
                } else if (fileData.type === 'token') {
                    const response = await fetch(`/api/file/tokens/${encodeURIComponent(fileData.filename)}`);
                    const data = await response.json();
                    if (data.success) {
                        fileViewerTitle.textContent = fileData.filename;
                        fileContent.textContent = data.content;
                    } else {
                        fileContent.textContent = '读取文件失败: ' + (data.error || '未知错误');
                    }
                }
            } catch (error) {
                fileContent.textContent = '加载文件失败: ' + error.message;
            }
        }

        async function copyFile(type, filename) {
            try {
                let url;
                if (type === 'cookies') {
                    url = `/api/file/cookies/${encodeURIComponent(filename)}`;
                } else if (type === 'tokens') {
                    url = `/api/file/tokens/${encodeURIComponent(filename)}`;
                } else {
                    return;
                }
                
                const response = await fetch(url);
                const data = await response.json();
                if (data.success) {
                    navigator.clipboard.writeText(data.content).then(() => {
                        alert('文件内容已复制到剪贴板');
                    });
                } else {
                    alert('复制失败: ' + (data.error || '未知错误'));
                }
            } catch (error) {
                alert('复制失败: ' + error.message);
            }
        }

        function copyAccount(email, password) {
            const text = `${email}\n${password}`;
            navigator.clipboard.writeText(text).then(() => {
                alert('账号信息已复制到剪贴板');
            });
        }

        function copyEmail(email) {
            navigator.clipboard.writeText(email).then(() => {
                alert('邮箱已复制到剪贴板');
            });
        }

        function copyPassword(password) {
            navigator.clipboard.writeText(password).then(() => {
                alert('密码已复制到剪贴板');
            });
        }

        async function refreshFileList() {
            if (currentFileType) {
                await loadFileContent(currentFileType);
            }
        }

        function copyFileContent() {
            const content = document.getElementById('fileContent').textContent;
            if (content && content !== '请从左侧列表选择一个文件查看内容...' && content !== '加载中...' && !content.includes('暂无')) {
                navigator.clipboard.writeText(content).then(() => {
                    alert('文件内容已复制到剪贴板');
                });
            }
        }

        function syncAccountListHeight() {
            const accountList = document.getElementById('accountList');
            const tokenTab = document.getElementById('tabToken');
            
            if (accountList && tokenTab && tokenTab.classList.contains('active')) {
                // 获取右侧容器（包含多个卡片的容器）
                const rightColumn = tokenTab.querySelector('.grid-2 > div:last-child');
                // 获取左侧卡片容器（包含账号列表的卡片）
                const leftCard = accountList.closest('.card');
                
                if (rightColumn && leftCard) {
                    // 获取右侧容器的实际高度
                    const rightColumnHeight = rightColumn.offsetHeight;
                    
                    // 获取左侧卡片标题的高度
                    const cardTitle = leftCard.querySelector('.card-title');
                    const cardTitleHeight = cardTitle ? cardTitle.offsetHeight : 0;
                    
                    // 获取左侧卡片的内边距
                    const cardStyle = window.getComputedStyle(leftCard);
                    const cardPaddingTop = parseFloat(cardStyle.paddingTop) || 28;
                    const cardPaddingBottom = parseFloat(cardStyle.paddingBottom) || 28;
                    
                    // 获取账号列表的内边距
                    const accountListStyle = window.getComputedStyle(accountList);
                    const accountListPaddingTop = parseFloat(accountListStyle.paddingTop) || 12;
                    const accountListPaddingBottom = parseFloat(accountListStyle.paddingBottom) || 12;
                    
                    // 计算账号列表应该的高度
                    // = 右侧容器高度 - 卡片标题高度 - 卡片上下内边距 - 账号列表上下内边距
                    const accountListHeight = rightColumnHeight - cardTitleHeight - cardPaddingTop - cardPaddingBottom - accountListPaddingTop - accountListPaddingBottom;
                    
                    // 设置账号列表高度，确保至少有 200px
                    const finalHeight = Math.max(200, accountListHeight);
                    accountList.style.height = finalHeight + 'px';
                    accountList.style.maxHeight = finalHeight + 'px';
                    accountList.style.overflowY = 'auto';
                }
            }
        }

        // 移动端优化
        function initMobileOptimizations() {
            // 防止双击缩放导致的意外点击
            let lastTouchEnd = 0;
            document.addEventListener('touchend', function(event) {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    event.preventDefault();
                }
                lastTouchEnd = now;
            }, false);

            // 优化触摸反馈
            const touchElements = document.querySelectorAll('.btn, .tab, .account-item, .file-item, .quick-btn');
            touchElements.forEach(el => {
                el.addEventListener('touchstart', function() {
                    this.style.opacity = '0.7';
                });
                el.addEventListener('touchend', function() {
                    setTimeout(() => {
                        this.style.opacity = '';
                    }, 150);
                });
            });

            // 改善移动端滚动体验
            const scrollableElements = document.querySelectorAll('.log-area, .account-list, #fileList, #fileContent');
            scrollableElements.forEach(el => {
                el.style.webkitOverflowScrolling = 'touch';
            });

            // 检测移动设备
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (isMobile) {
                document.body.classList.add('mobile-device');
                // 移动端自动调整字体大小
                const style = document.createElement('style');
                style.textContent = `
                    .mobile-device .form-input {
                        font-size: 16px !important;
                    }
                `;
                document.head.appendChild(style);
            }
        }

        // Initialize
        connectWebSocket();
        loadAccounts();
        initMobileOptimizations();
        
        // Load initial stats
        fetch('/api/stats').then(r => r.json()).then(updateStats);
        
        // 同步账号列表高度
        window.addEventListener('resize', syncAccountListHeight);
        setTimeout(syncAccountListHeight, 100);
        setTimeout(syncAccountListHeight, 500);
    </script>
</body>
</html>
